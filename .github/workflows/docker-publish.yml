name: Docker Publish

on:
  push:
    branches:
      - main  # 当代码推送到 main 分支时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # 存储在 GitHub Secrets 中
        password: ${{ secrets.DOCKER_PASSWORD }}  # 存储在 GitHub Secrets 中

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/pool:latest
